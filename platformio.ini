; ============================================================
; BirdNest Camera – ESP32-CAM
; All tunable parameters are defined here as build flags.
; For OTA upload: uncomment upload_protocol / upload_port in
; the relevant env, or use the dedicated OTA envs below.
;
; Shared settings live in [env] (applied to every camera).
; Per-camera overrides live in [env:camX].
; ============================================================

[platformio]
; Default environment used by Build / Upload buttons.
; Change to cam2, cam3, cam1_ota, etc. as needed.
;default_envs = cam1
default_envs = cam2_ota
; ------------------------------------------------------------
; Shared settings – inherited by all camera environments
; ------------------------------------------------------------
[env]
platform = espressif32
board = esp32cam
framework = arduino
extra_scripts =
    pre:scripts/fw_version_from_git.py
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = partitions_ota_4m.csv

lib_deps =
    tzapu/WiFiManager @ ^2.0.0
    witnessmenow/UniversalTelegramBot @ ^1.3.0
    bblanchon/ArduinoJson @ ^6.21.5
    paulstoffregen/OneWire @ ^2.3.7
    milesburton/DallasTemperature @ ^4.0.0
    knolleary/PubSubClient @ ^2.8

build_flags =
    ; --- Hardware ---
    -D TEMP_PIN=13
    ; DS18B20 samples per read (lower = less wake time / battery use)
    -D TEMP_SAMPLE_COUNT=2

    ; Camera capture quality and resolution.
    ; FRAMESIZE enum values: 8=VGA(640x480) 9=SVGA(800x600) 10=XGA(1024x768)
    ;                        12=SXGA(1280x1024) 13=UXGA(1600x1200)
    ; JPEG quality: 1=best/large file  20=lower quality/small file
    ; Live-parity profile (from !BirdNestCam_live): higher detail, proven stable remotely
    -D CAMERA_FRAMESIZE_PSRAM=13
    -D CAMERA_JPEG_QUALITY_PSRAM=3
    -D CAMERA_FRAMESIZE_NOPSRAM=8
    -D CAMERA_JPEG_QUALITY_NOPSRAM=12
    ; Warm-up frames before capture (AEC/AWB settling)
    -D CAMERA_WARMUP_FRAMES=4

    ; Preset profile: AGGRESSIVE RELIABILITY (active)
    ; Use this for remote devices on unstable links.
    ; Retry frame-grab to avoid intermittent fb_get failures on remote nodes
    -D CAMERA_FB_GET_RETRIES=3
    -D CAMERA_FB_GET_RETRY_DELAY_MS=120
    ; Photo upload and response timeouts (ms)
    -D CAMERA_UPLOAD_CHUNK_TIMEOUT_MS=10000
    -D CAMERA_RESPONSE_TIMEOUT_MS=20000

    ; Preset profile: CONSERVATIVE POWER (manual switch)
    ; To use: comment out the AGGRESSIVE values above and uncomment these.
    ; -D CAMERA_FB_GET_RETRIES=3
    ; -D CAMERA_FB_GET_RETRY_DELAY_MS=120
    ; -D CAMERA_UPLOAD_CHUNK_TIMEOUT_MS=8000
    ; -D CAMERA_RESPONSE_TIMEOUT_MS=15000
    ; Image quality adjustments (range -2 to +2; 0 = sensor default)
    ; Live-project parity: all 0 (sensor defaults). The live project does NOT
    ; set these, so we match by explicitly sending 0.
    ; To tune: change individual values or enable CAMERA_DYNAMIC_EXPOSURE_PROFILE.
    -D CAMERA_SATURATION=0
    -D CAMERA_CONTRAST=0
    -D CAMERA_BRIGHTNESS=0
    -D CAMERA_SHARPNESS=0
    ; Light threshold between night and day (0-255, sensor register 0x2f)
    ; Lower value = more aggressive night mode (longer exposure)
    -D CAMERA_DAY_THRESHOLD=140
    ; Dynamic day/lowlight exposure profile.
    ; Dynamic day/lowlight exposure profile removed (incompatible with AGC-off
    ; register ladder approach). Image tuning via CAMERA_SATURATION/CONTRAST/BRIGHTNESS/SHARPNESS.

    ; Battery monitor on ADC pin via resistor divider:
    ; Vbat -- Rtop -- ADC -- Rbottom -- GND
    ; Default divider: 2M (top) / 1M (bottom) -> ADC sees Vbat/3
    -D BATTERY_ADC_PIN=12
    -D BATTERY_ADC_SAMPLES=8
    -D BATTERY_ADC_SETTLE_US=5000
    -D BATTERY_CAL_MULT=1.00f
    -D BATTERY_ADC_VREF=3.3f
    -D BATTERY_ADC_MAX=4095.0f
    -D BATTERY_DIVIDER_RTOP=2000000.0f
    -D BATTERY_DIVIDER_RBOTTOM=1000000.0f
    -D BATTERY_EMPTY_V=3.20f
    -D BATTERY_FULL_V=4.20f

    ; --- WiFi captive portal ---
    '-D AP_NAME="BirdNest"'
    -D CONFIG_PORTAL_TIMEOUT=180
    ; Remote deployment: disable captive portal and fail fast to deep sleep
    -D WIFI_ENABLE_CAPTIVE_PORTAL=0
    -D WIFI_FAIL_FAST_SEC=15
    '-D AP_PASSWORD="birdnest123"'
    ; Preset profile: AGGRESSIVE RELIABILITY (active)
    ; Weak/unstable network resilience
    -D WIFI_BOOT_CONNECT_RETRIES=3
    -D WIFI_BOOT_RETRY_BACKOFF_SEC=5
    -D WIFI_RUNTIME_RECONNECT_INTERVAL_SEC=15
    -D WIFI_RUNTIME_REBOOT_AFTER_SEC=300

    ; Preset profile: CONSERVATIVE POWER (manual switch)
    ; To use: comment out the AGGRESSIVE values above and uncomment these.
    ; -D WIFI_BOOT_CONNECT_RETRIES=2
    ; -D WIFI_BOOT_RETRY_BACKOFF_SEC=5
    ; -D WIFI_RUNTIME_RECONNECT_INTERVAL_SEC=30
    ; -D WIFI_RUNTIME_REBOOT_AFTER_SEC=0

    ; --- OTA ---
    ; OTA transfer stall watchdog (seconds)
    -D OTA_STALL_TIMEOUT_SEC=180
    ; ArduinoOTA socket timeout (milliseconds)
    -D OTA_TIMEOUT_MS=10000
    ; Startup window (seconds) where only OTA is polled before normal boot continues.
    ; PlatformIO has this long to initiate a connection after the device comes online.
    -D OTA_STARTUP_WINDOW_SEC=8
    ; Persistent low-power OTA recovery after a remote /reboot request.
    ; The device opens a longer OTA window, then sleeps and retries for a bounded number of cycles.
    -D OTA_RECOVERY_WINDOW_SEC=120
    -D OTA_RECOVERY_SLEEP_SEC=900
    -D OTA_RECOVERY_LOW_BATTERY_SLEEP_SEC=3600
    -D OTA_RECOVERY_CYCLES=16
    ; Do not stay awake for OTA recovery below this battery voltage.
    -D OTA_RECOVERY_MIN_BATTERY_V=3.70f
    ; First remote install preflight thresholds
    -D BOOTSTRAP_MIN_BATTERY_V=3.80f
    -D BOOTSTRAP_MIN_RSSI_DBM=-82

    ; --- GitHub OTA ---
    ; Repository coordinates for release API queries.
    ; Override OTA_GH_OWNER and OTA_GH_REPO with your actual GitHub account/repo.
    '-D OTA_GH_OWNER="VorosEgyes"'
    '-D OTA_GH_REPO="BirdNest"'
    '-D OTA_GH_API_HOST="api.github.com"'
    ; WiFi stability threshold for auto-check gate (use -127 to disable RSSI gate)
    -D GH_OTA_WIFI_STABLE_RSSI_MIN=-85
    -D GH_OTA_HTTP_TIMEOUT_MS=12000
    -D GH_OTA_MAX_CHECK_ATTEMPTS=4
    -D GH_OTA_CHECK_RETRY_DELAY_MS=1500

    ; --- Telegram ---
    -D PHOTO_INTERVAL_SEC=300
    ; Preset profile: AGGRESSIVE RELIABILITY (active)
    ; Photo send retries for unstable links
    -D PHOTO_SEND_MAX_RETRIES=4
    -D PHOTO_SEND_RETRY_BACKOFF_MS=1200

    ; Preset profile: CONSERVATIVE POWER (manual switch)
    ; To use: comment out the AGGRESSIVE values above and uncomment these.
    ; -D PHOTO_SEND_MAX_RETRIES=2
    ; -D PHOTO_SEND_RETRY_BACKOFF_MS=600

    ; --- Power saving ---
    ; Deep sleep duration in seconds (600 = 10 minutes).
    ; Can be changed at runtime via /sleepXX Telegram command (XX = minutes).
    -D DEEP_SLEEP_SEC=600

    ; --- NTP / local time ---
    '-D NTP_TZ="CET-1CEST,M3.5.0/2,M10.5.0/3"'
    '-D NTP_SERVER_1="pool.ntp.org"'
    '-D NTP_SERVER_2="time.google.com"'
    '-D NTP_SERVER_3="time.cloudflare.com"'

; ------------------------------------------------------------
; Camera 1 – USB upload
; ------------------------------------------------------------
[env:cam1]
;upload_port = /dev/cu.usbserial-*   ; adjust if needed
build_flags =
    ${env.build_flags}

; Camera 1 – OTA upload
[env:cam1_ota]
upload_protocol = espota
upload_port = 192.168.0.14
build_flags =
    ${env.build_flags}

; ------------------------------------------------------------
; Camera 2 – USB upload
; ------------------------------------------------------------
[env:cam2]
;upload_port = /dev/cu.usbserial-*   ; adjust if needed
build_flags =
    ${env.build_flags}

## Camera 2 – OTA upload
[env:cam2_ota]
upload_protocol = espota
upload_port = BravoNest.local
build_flags =
    ${env.build_flags}

; ------------------------------------------------------------
; Camera 3 – USB upload
; ------------------------------------------------------------
[env:cam3]
;upload_port = /dev/cu.usbserial-*   ; adjust if needed
build_flags =
    ${env.build_flags}

; Camera 3 – OTA upload
[env:cam3_ota]
upload_protocol = espota
upload_port = AlphaNest.local
build_flags =
    ${env.build_flags}

[env:cam4]
;upload_port = /dev/cu.usbserial-*   ; adjust if needed
build_flags =
    ${env.build_flags}

; Camera 4 – OTA upload
[env:cam4_ota]
upload_protocol = espota
upload_port = DeltaNest.local
build_flags =
    ${env.build_flags}

; ------------------------------------------------------------
; Release build – used by GitHub Actions CI to produce the
; single firmware binary attached to every GitHub release.
; Do NOT use this env for day-to-day OTA uploads.
; ------------------------------------------------------------
[env:release]
build_flags =
    ${env.build_flags}
