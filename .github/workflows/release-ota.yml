name: Release OTA Assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install --upgrade platformio

      - name: Prepare Version
        id: prep
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_bin=birdnest-esp32cam-${TAG}.bin" >> "$GITHUB_OUTPUT"

      - name: Build Firmware
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.prep.outputs.version }}
        run: |
          set -euo pipefail
          # Inject version into the auto-generated header (overrides the git-tag script output).
          echo "#pragma once" > include/fw_version_auto.h
          echo "// Auto-generated by CI for release ${RELEASE_VERSION}" >> include/fw_version_auto.h
          echo "#define FW_VERSION \"${RELEASE_VERSION}\"" >> include/fw_version_auto.h
          pio run -e release

      - name: Create OTA Assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          BIN_SRC=".pio/build/release/firmware.bin"
          BIN_NAME="${{ steps.prep.outputs.asset_bin }}"
          BIN_DST="dist/${BIN_NAME}"

          cp "$BIN_SRC" "$BIN_DST"

          SHA256="$(sha256sum "$BIN_DST" | awk '{print $1}')"

          cat > dist/ota-manifest.json <<EOF
          {
            "version": "${{ steps.prep.outputs.version }}",
            "channel": "stable",
            "board": "esp32cam",
            "bin_asset_name": "${BIN_NAME}",
            "sha256": "${SHA256}",
            "min_battery_v": 3.70
          }
          EOF

          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "BIN_NAME=${BIN_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep.outputs.tag }}
          files: |
            dist/${{ steps.prep.outputs.asset_bin }}
            dist/ota-manifest.json
